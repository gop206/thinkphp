apiVersion: apps/v1
kind: Deployment
metadata:
  name: thinkphp-app
  namespace: default # 也可以是你自定义的 namespace
spec:
  replicas: 2
  selector:
    matchLabels:
      app: thinkphp
  template:
    metadata:
      labels:
        app: thinkphp
    spec:
      containers:
      - name: php-nginx
        image: ghcr.io/gop206/thinkphp:latest
        # 强制每次拉取最新，确保 latest 标签生效
        imagePullPolicy: Always 
        ports:
        - containerPort: 80
---
apiVersion: v1
kind: Service
metadata:
  name: thinkphp-service
spec:
  type: NodePort
  selector:
    app: thinkphp
  ports:
  - port: 80
    targetPort: 80
    nodePort: 30080 # 访问地址：http://服务器IP:30080
